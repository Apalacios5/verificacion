<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificando información...</title>

<style>
body{
    margin:0;
    background:#f4f4f4;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#loading{
    text-align:center;
}

.bar{
    width:350px;
    height:25px;
    border-radius:20px;
    border:2px solid #888;
    overflow:hidden;
    margin:auto;
}

.fill{
    height:100%;
    width:0%;
    background:#2ecc71;
    animation:load 6s linear forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}

#scare{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    justify-content:center;
    align-items:center;
}

#scare img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>

<div id="loading">
<h1>Verificando información...</h1>
<p>Espere unos segundos.</p>

<div class="bar">
<div class="fill"></div>
</div>

</div>

<div id="scare">
<img src="https://i.imgur.com/ZK7YQ9T.jpg">
<audio id="audio" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>
</div>

<script>

setTimeout(()=>{

document.getElementById("loading").style.display="none";
document.getElementById("scare").style.display="flex";

const audio=document.getElementById("audio");
audio.volume=1;
audio.play();

},6000);

</script>

</body>
</html>
