<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Actualización</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    overflow:hidden;
}

/* INICIO */
#inicio{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:#f2f2f2;
}

/* BOTÓN */
#personalBtn{
    background:#0078D4;
    color:white;
    border:none;
    padding:15px 40px;
    font-size:20px;
    border-radius:10px;
    cursor:pointer;
    margin-top:20px;
}

/* LOADING */
#loading{
    display:none;
    height:100vh;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:white;
}

.bar{
    width:300px;
    height:20px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:20px;
}

.fill{
    width:0%;
    height:100%;
    background:#0078D4;
    animation:load 6s linear forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}

/* SCARE FULL SCREEN */
#scare{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#scare img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BLOQUEO */
#blocker{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:#f2f2f2;
    display:none;
    z-index:999;
}
</style>

</head>

<body>

<div id="blocker"></div>

<div id="inicio">
    <h1>Actualización disponible</h1>
    <p>Presione el botón para iniciar.</p>

    <button id="personalBtn">Personal</button>
</div>

<div id="loading">
    <h1>Verificando información...</h1>
    <p>Espere unos segundos.</p>

    <div class="bar">
        <div class="fill"></div>
    </div>
</div>

<div id="scare">
    <!-- NUEVA IMAGEN -->
    <img src="https://kommodo.ai/i/YzLSnjUzVjNeyDkfk6kR" alt="scare">

    <audio id="audio" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>
</div>

<script>

const btn = document.getElementById("personalBtn");

btn.onclick = function(){

    document.getElementById("inicio").style.display="none";
    document.getElementById("loading").style.display="flex";

    setTimeout(function(){

        document.getElementById("loading").style.display="none";
        document.getElementById("scare").style.display="flex";

        const audio = document.getElementById("audio");
        audio.volume = 1;

        // mejora compatibilidad
        audio.play().catch(()=>{});

        document.body.style.overflow = "hidden";

    },6000);

};

</script>

</body>
</html>
