<body>

<div id="inicio" style="text-align:center;">
    <h1>Actualización disponible</h1>
    <p>Presione el botón para iniciar.</p>

    <button id="personalBtn"
        style="
        background:#0078D4;
        color:white;
        border:none;
        padding:15px 40px;
        font-size:20px;
        border-radius:10px;
        cursor:pointer;">
        Personal
    </button>
</div>

<div id="loading" style="display:none;">
    <h1>Verificando información...</h1>
    <p>Espere unos segundos.</p>

    <div class="bar">
        <div class="fill"></div>
    </div>
</div>

<div id="scare">
    <img src="https://i.imgur.com/ZK7YQ9T.jpg">
    <audio id="audio" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>
</div>

<script>

document.getElementById("personalBtn").onclick = function(){

    document.getElementById("inicio").style.display="none";
    document.getElementById("loading").style.display="block";

    setTimeout(function(){

        document.getElementById("loading").style.display="none";
        document.getElementById("scare").style.display="flex";

        const audio=document.getElementById("audio");
        audio.volume=1;
        audio.play();

    },6000);

};

</script>

</body>
